<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tronic POS — Offline</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .offline-card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .offline-icon { font-size: 4rem; color: #6c757d; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon mb-3">
      <i class="bi bi-wifi-off"></i>
    </div>
    <h3 class="fw-bold mb-2">You're Offline</h3>
    <p class="text-muted mb-4">
      Tronic POS is running in offline mode. Cash sales made at the POS are
      saved locally and will sync automatically when you reconnect.
    </p>
    <div class="d-grid gap-2">
      <a href="/" class="btn btn-primary btn-lg">
        <i class="bi bi-cash-register me-2"></i>Open POS
      </a>
      <button class="btn btn-outline-secondary" onclick="location.reload()">
        <i class="bi bi-arrow-clockwise me-2"></i>Try Again
      </button>
    </div>
  </div>
  <script>
    window.addEventListener('online', () => location.assign('/'));
  </script>
</body>
</html>
